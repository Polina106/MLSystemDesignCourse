<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Подбор рациона питания</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Подбор рациона питания</h1>
      <p>Шаг 1. Заполните анкету — на следующей странице увидите рацион.</p>
    </header>

    <main class="layout layout--single">
      <section class="card form-card">
        <h2>Анкета</h2>
        <form id="questionnaire-form">
          <div class="field-row">
            <div class="field">
              <label for="height_cm">Рост (см)</label>
              <input type="number" id="height_cm" name="height_cm" min="100" max="250" required />
            </div>
            <div class="field">
              <label for="weight_kg">Вес (кг)</label>
              <input type="number" id="weight_kg" name="weight_kg" min="30" max="300" required />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <span class="field-label">Пол</span>
              <div class="segmented-group" id="sex-group">
                <label class="segment">
                  <input type="radio" name="sex" value="female" required />
                  <span>Женский</span>
                </label>
                <label class="segment">
                  <input type="radio" name="sex" value="male" />
                  <span>Мужской</span>
                </label>
              </div>
            </div>

            <div class="field">
              <span class="field-label">Уровень активности</span>
              <div class="segmented-group" id="activity-group">
                <label class="segment">
                  <input type="radio" name="activity_level" value="low" required />
                  <span>Низкий</span>
                </label>
                <label class="segment">
                  <input type="radio" name="activity_level" value="moderate" />
                  <span>Средний</span>
                </label>
                <label class="segment">
                  <input type="radio" name="activity_level" value="high" />
                  <span>Высокий</span>
                </label>
              </div>
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="active_cook_minutes">Активное время готовки, мин</label>
              <input type="number" id="active_cook_minutes" name="active_cook_minutes" min="0" max="300" required />
            </div>
            <div class="field">
              <label for="passive_cook_minutes">Пассивное время готовки, мин</label>
              <input type="number" id="passive_cook_minutes" name="passive_cook_minutes" min="0" max="300" required />
            </div>
          </div>

          <div class="field-group">
            <h3>Аллергены (1 — есть аллергия)</h3>
            <div class="chips-grid" id="allergens-container">
              <!-- чекбоксы будут добавлены через JS -->
            </div>
          </div>

          <div class="field-group">
            <h3>Предпочтения по кухне</h3>
            <p class="hint">Отметьте кухни, которые вам нравятся (1 — нравится).</p>
            <div class="chips-grid" id="cuisines-container">
              <!-- чекбоксы будут добавлены через JS -->
            </div>
          </div>

          <button type="submit" class="primary-btn">Подобрать рацион</button>
          <p id="status" class="status"></p>
        </form>
      </section>
    </main>
  </div>

  <script src="/static/questionnaire.js"></script>
</body>
</html>
