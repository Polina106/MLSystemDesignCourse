<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мой рацион питания</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Мой рацион питания</h1>
      <p>Шаг 2. На основе анкеты подобраны рецепты на день.</p>
      <p style="margin-top:6px;font-size:13px;">
        <a href="/" class="nav-link">Изменить анкету</a>
        <span style="color:var(--text-muted);margin:0 6px;">·</span>
        <a href="/viewed" class="nav-link">Просмотренные</a>
        <span style="color:var(--text-muted);margin:0 6px;">·</span>
        <a href="/favorites" class="nav-link">Избранное</a>
      </p>
    </header>

    <main class="layout layout--single">
      <section class="card results-card">
        <h2>Подобранные рецепты</h2>
        <div class="results-header-row">
          <button type="button" id="regenerate-btn" class="primary-btn primary-btn--ghost">
            Перегенерировать рацион
          </button>
          <p id="status" class="status"></p>
        </div>
        <div id="calories-summary" class="calories-summary" aria-hidden="true"></div>
        <div id="results" class="results-list">
          <p class="placeholder">
            Если вы попали сюда напрямую, сначала заполните
            <a href="/" style="color:#bbf7d0;">анкету</a>.
          </p>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/plan.js"></script>
</body>
</html>
